name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install (builds the Rust extension via maturin)
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q
      - name: Lint
        run: ruff check .

  rust:
    name: rust (cargo test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # PYO3_PYTHON lets the in-crate `cargo test` link libpython without the
      # maturin `extension-module` feature (see rust/Cargo.toml).
      - name: cargo test
        working-directory: rust
        env:
          PYO3_PYTHON: python
        run: cargo test
      - name: cargo clippy
        working-directory: rust
        env:
          PYO3_PYTHON: python
        run: cargo clippy --all-targets -- -D warnings
