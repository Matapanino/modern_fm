name: Release

# Builds abi3 wheels (one per platform covers CPython >= 3.10) + an sdist, and
# publishes to PyPI via trusted publishing (OIDC) on a v* tag. Publishing
# requires a PyPI trusted publisher configured for this repo and the `pypi`
# GitHub environment; until a tag is pushed nothing is published.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # build artifacts without publishing (no tag => publish skipped)

jobs:
  wheels:
    name: wheels (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            args: --release --out dist
            manylinux: auto
          - os: macos-latest
            args: --release --out dist --target universal2-apple-darwin
          - os: windows-latest
            args: --release --out dist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.platform.args }}
          manylinux: ${{ matrix.platform.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish:
    name: publish to PyPI (trusted publishing)
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # OIDC token for trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
