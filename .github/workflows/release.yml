name: Release

# Builds abi3 wheels (one per platform covers CPython >= 3.10) + an sdist, and
# publishes to PyPI via trusted publishing (OIDC) on a v* tag. Publishing
# requires a PyPI trusted publisher configured for this repo and the `pypi`
# GitHub environment; until a tag is pushed nothing is published.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # build artifacts without publishing (no tag => publish skipped)

jobs:
  wheels:
    name: wheels (${{ matrix.platform.os }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Linux wheels ship CUDA-ready since 1.1.0: cudarc's pinned
          # `dynamic-loading` dlopens the driver at runtime only, so the wheel
          # needs no CUDA toolkit to build, stays manylinux-clean (verified by
          # the linux-wheel-check job below) and imports fine on CUDA-less
          # machines (has_cuda() is just False there).
          - os: ubuntu-latest
            args: --release --out dist --features cuda-backend
            manylinux: auto
          - os: macos-latest
            args: --release --out dist --target universal2-apple-darwin
          - os: windows-latest
            args: --release --out dist
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.platform.args }}
          manylinux: ${{ matrix.platform.manylinux }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  # The CUDA-enabled Linux wheel must behave exactly like a CPU wheel on a
  # CUDA-less machine: import cleanly, report has_cuda() False, pass the full
  # suite, and link no CUDA library (manylinux compliance — cudarc must only
  # dlopen at runtime). Publishing is gated on this.
  linux-wheel-check:
    name: linux wheel on CPU-only (import + tests + auditwheel)
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          name: wheels-ubuntu-latest
          path: dist
      - name: Install the wheel (not the source tree)
        run: |
          pip install dist/*manylinux*.whl
          pip install pytest pandas polars auditwheel
      - name: Import on a CUDA-less machine, has_cuda() is False
        run: |
          python -c "import modern_fm; from modern_fm import _backend; assert _backend.has_rust(); assert _backend.has_cuda() is False"
      - name: auditwheel — manylinux tag, no CUDA library in required libs
        run: |
          auditwheel show dist/*manylinux*.whl | tee audit.txt
          grep -q "manylinux" audit.txt
          if grep -iE "libcuda|libnvrtc" audit.txt; then
            echo "wheel links a CUDA library — dynamic loading regressed" >&2
            exit 1
          fi
      - name: Full test suite against the installed wheel
        run: pytest -q

  publish:
    name: publish to PyPI (trusted publishing)
    needs: [wheels, sdist, linux-wheel-check]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # OIDC token for trusted publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
