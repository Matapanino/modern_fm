site_name: modern_fm
site_description: >-
  Factorization Machines (FM/FFM/FwFM) for Python — sklearn-compatible API,
  Rust CPU core, optional CUDA backend.
site_url: https://matapanino.github.io/modern_fm/
repo_url: https://github.com/Matapanino/modern_fm
repo_name: Matapanino/modern_fm

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: light mode

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API reference: api_design.md
  - Data format: data_format.md
  - Math:
      - FM / FFM spec: math_spec.md
      - FwFM spec: math_spec_fwfm.md
      - Optimization: optimization_spec.md
  - GPU backend:
      - CUDA plan & status: gpu_backend_plan.md
      - Validation runbook: cuda_validation_runbook.md
  - Project:
      - Roadmap: roadmap.md
      - Requirements: requirements.md
      - Test plan: test_plan.md
      - Benchmark plan: benchmark_plan.md
      - References: references.md
